  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
 span {
   /* span margin은 좌우는 적용, 상하는 미적용 */ 
  width: 300px; height: 100px; background: yellow;

  /* span margin은 좌우는 적용, 상하는 미적용 */ 
 }
 div {
  width: 300px; height: 100px; background: blue;
  margin: 5px;
 }
 table, td, th {
    width: 800px; height: 70px;
    border: 1px solid black;
    border-collapse: collapse;
    text-align: center; 
  }

<body>

  <div>1</div>
  <div>2</div>
  <table>
    <tr>
      <th>block 속성의 태그 :: 공간에 대한 영역</th>
      <th>inline 속성의 태그 :: 컨텐트에 대한 영역</th>
    </tr>
    <tr>
      <td>h1~h6, p, pre, blockquote, ul, ol, li, div, ...</td>
      <td>img, a, audio, video, span, ...</td>
