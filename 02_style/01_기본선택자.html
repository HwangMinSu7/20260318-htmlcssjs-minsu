<!DOCTYPE html>
<html lang="ko">
<head>

 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <script>
  
 </script>
 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home" />
 <style>
  /* 전체선택자 */
  /* -- 도 주석 처리가 된다. */
  * {
      --margin: 0px;
      padding: 0px;
    }
    /* 태그선택자 */
  body {
    background-color: lemonchiffon;
  }
  ul { /*공부하기*/
    list-style: none;
  }
  li {
    font-style: italic;
  }
  /* 아이디 선택자   # 이 들어간다 (공부) */
  #pick {
    font-weight: bold;
    background-color: antiquewhite;
  }
  /* 클래스선택자 . 이 들어간다. 증복적용 가능, 공백으로 구분*/
  .text_item {
    text-decoration: underline;
  }
  .text-light {
    font-family: 궁서체;
  }

 </style>
</head>

<body>
<h1>기본선택자</h1>
<a href="/"><span class="material-symbols-outlined">
home
</span>home</a>
<hr>
<ul> <!--기본선택자 전체 태그 -->
  <li class="text-item text-light">전체선택자*</li>
  <!-- class는 복수로 사용 가능 (대문자면 안됌 단, 첫글자만 대문자가 아니면 됌) -->
  <li class="text-item">태그선택자</li>
  <li class="text-item text-light" id="pick">아이디선택자</li>
  <li class="text-item" id="pick">클래스선택자</li>
  <!-- 하나만 가능(?) 속성에 ID 만 있을때 -->
</ul>

</body>

</html>
