<!DOCTYPE html>
<html lang="ko">
<!-- 상태 선택자 이거 제미나이랑 다시 공부 -->
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>

  </script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
    #choice:checked~input[type=text] {
      background-color: gold;
    }
    #name:focus {
      background: pink;
    }
    #notice:disabled~#result {
      color: red;
    }
  </style>
</head>

<body>
  <h1>상태 선택자</h1>
  <p>checked ? , focus ? , disabled 못움직이게 한는것</p>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
  <div>
      <label for="choice">CHECKED선택</label>
      <input type="checkbox" id="choice">
      <input type="text">
    </div>
    <input type="text" name="name" id="name">
  <div>
      <label for="view">선택 후</label>
      <input type="checkbox" id="view" onclick="disabletext()">
      <input type="text" name="notice" id="notice">
      <label id="result">경고</label>
    </div>
    <script>
      function disabletext(){
        const noti = document.querySelector("#notice");
        noti.disabled = !noti.disabled; //#notice의 현재 disabled에 !를 연산
      }
    </script>
    
   

</body>

</html>
