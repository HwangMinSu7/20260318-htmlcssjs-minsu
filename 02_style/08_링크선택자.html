<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>

  </script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
   a {text-decoration: none;}
   /* 구글 밑의 밑줄 없앰 */
   a:hover {text-decoration: underline;}
   /* 구글에 마우스를 가져다 가면 밑줄이 나옴 */
   a:link {color: black;}
   /* 처음(방문 하기 전) */
   a:visited {color: gray;}
   /* 같다 오고 난 후 회색이 된다. */
  </style>
</head>

<body>
  <h1>링크 선택자</h1>
  <p>link, visited 반응선택자hover와 같이 사용</p>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
  <a href="https://www.google.com">구글</a>
  <a href="https://www.naver.com">네이버</a>

</body>

</html>
