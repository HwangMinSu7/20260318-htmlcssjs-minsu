<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
   .box {
    width: 100px;
    height: 100px;
    background-color: skyblue;
    position: relative;

    animation-name: moveBox;
    animation-duration: 1s;
    animation-iteration-count: infinite;
    animation-direction: alternate;
   }
   @keyframes moveBox {
    from{
      left: 0;
    }
    to {
      left: 300px;
    }
   }
  </style>
</head>

<body>
  <h1>CSS의 animation</h1>
  <p>@keyframes, from {} to {} 활용 </p>
  <a href="/"><span class="material-symbols-outlined">home</span></a>
  <hr>
  <div class="box"></div>

</body>

</html>
