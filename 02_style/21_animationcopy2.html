<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
   .box {
    width: 100px;
    height: 100px;
    background-color: skyblue;
    position: relative;
    border-radius: 50%;
    animation: changeEffect 3s infinite alternate; /*3초 동안 무한 진행*/
   }
   @keyframes changeEffect {
    0% {background-color: tomato; transform: scale(1);}
    50% {background: gold; transform: scale(1.3);}
    100% {background: mediumspringgreen; transform: scale(1);}
   }
  </style>
</head>

<body>
  <h1>CSS의 animation 2</h1>
  <p>@keyframes, from {} to {} 활용 </p>
  <a href="/"><span class="material-symbols-outlined">home</span></a>
  <hr>
  <div class="box"></div>

</body>

</html>
