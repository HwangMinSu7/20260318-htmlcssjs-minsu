<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=heart_plus" />
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
   .btn {
    padding: 15px 30px;
    background-color: royalblue;
    color: white;
    font-size: 20pt;
    transition: all 0.3s ease;
    cursor: pointer;
   }
    .btn:hover {
      color: yellowgreen;
      transform: scale(2) rotate(360deg);
      /* rotate 그림(?) 돌아가는 각 지정 */
    }
   
.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24
}

  </style>
</head>

<body>
  <h1>CSS의 animation 2</h1>
  <p>@keyframes, from {} to {} 활용 </p>
  <a href="/"><span class="material-symbols-outlined">home</span></a>
  <hr>
  <span class="material-symbols-outlined btn">heart_plus</span>
  
</body>

</html>
