<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
  </style>

<body>
  <h1>반복 구문에서 사용(break, continue)</h1>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
  <script>
    for(let i = 0; i < 10; i++) {
    let tmp = i + 1; // 1~10 까지 들어간다 (원래는 0~9까지)
  if(tmp % 2 == 0) continue; // 아래문장 실행 안함
  console.log(tmp)
    }
    let i = 0
    while(true) { // 초기값
      console.log(i)
      if(i++ == 10) break; // 조건   i++ 증감
    }
  </script>
</body>
