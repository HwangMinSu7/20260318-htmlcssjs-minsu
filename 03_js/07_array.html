<body>
  <h1>배열(Array :: 같은 이름으로 여러개의 원소를 지정)</h1>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <p>배열은 원소에 접근할 때 index로 접근, 배열은 자체적으로 길이 값을 제공</p>
  <ol>
    <li>배열의 선언</li>
  <script>
    // 개별적으로 변수를 선언하기 매우 번거로움
    const scoreMs = 100;
    const scoreCy = 100;
    const scoreJw = 100;

    // 하나의 이름으로 여러개의 값을 담을 수 있음.
    let scores = [88, 74, 92, 64, 100, 99]
    let tot = 0;
    for(let i = 0; i < scores.length; i++) { 
      // scores.length 스코어스 길이 값(점수가 몇개 인가.?)
      tot = tot + scores[i]
    }
    console.log(`합계는 ${tot}`)
    console.log(`합계는 ${tot} 평균은 ${Math.floor(tot/scores.length)}`)

    const fruits = ["Apple", "Banana", "Grape"]
    console.log(fruits[0])
    console.log(fruits)    
  </script>

  <li>배열의 함수(push, pop, shift, unshift, splice, indexOf, includes)</li>
  <script>
console.log("=====배열 원소 추가, 삭제=====")
    const stack = [1, 2, 3, 4, 5]
    console.log(stack)
    stack.push(6) // push() 마지막에 원소 추가
    console.log(stack)
    console.log(stack.pop()) // pop() (마지막 원소제거 및 출력??) 함수를 실행할땐 소활오 꼭 붙여 줘야 한다.
    console.log(stack)
console.log("==============================")
    const queue = stack;
    console.log(queue)
    queue.push(6) // 마지막 원소 추가
    console.log(queue)
    console.log(queue.shift()) // shift() 맨 앞의 원소 제거 및 출력
    console.log(queue)
console.log("==============================")
    console.log(queue.unshift(7)) // unshift() 맨 앞의 원소 추가
    console.log(queue)
console.log("=====배열 자르기, 합치기=====")
   let arr1 = [10, 20, 30, 40, 50]
    const arr2 = arr1.slice(0, 2); // slice() 잘라내기 배열원소일부추출(원본유지),마지막 인자 제외
    console.log(arr2);
    console.log(arr1)
console.log("==============================")
    const arr3 = arr1.splice(0, 2); // splice() 잘라내기 배열원소추출(원본갱신),마지막 인자 제외
    console.log("arr3:",arr3);
    console.log("splice() 잘라내기 후: ",arr1)

    arr1.splice(0, 0, 20) // splice()(인덱스, 삭제할 갯수, 값) 0번째에 지우는거 없이 20을 추가
    console.log("splice() 합치기 후: ",arr1)
console.log("==============================")
    console.log(arr2)
    console.log(arr1)
    console.log(arr3.indexOf(3)) // 7,2만 있기 때문에 3이 없음 그래서 -1을 반환
    console.log(arr1.indexOf(3)) // 7,2만 있기 때문에 3이 없음 그래서 -1을 반환
  </script>
