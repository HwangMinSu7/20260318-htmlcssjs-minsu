<body>
  <h1>화살표 함수(arrow function :: 함수의 축약형)</h1>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
  <p></p>
  <ol>
    <li>원형 함수는 화살표 함수로 변형이 불가</li>
    <li>익명 함수만 화살표함수로 변형가능</li>
    <script> // 함수는 기능을 합한 것 (처리할 내용을 한번에 처리)
      var fnc1 = function() {
        conosle.log("매개변수(x), 리턴(x)")
      }
      fnc1 = () => {conosle.log("매개변수(x), 리턴(x)")}
      fnc1 = () => conosle.log("매개변수(x), 리턴(x)")
      // 한줄 만 쓸때 중괄호 {} 생략 가능
      

      var fnc1 = function(a) {
        conosle.log("매개변수(o), 리턴(x)")
      }
      var fnc1 = function() {
        return("매개변수(x), 리턴(o)")
      }
      var fnc1 = function(a) {
        return("매개변수(o), 리턴(o)")
      }
    </script>
  </ol>
  <script>
  </script>
</body>
