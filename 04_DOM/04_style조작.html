<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  
  <style>
    *{margin : 0;}
  </style>
  
  <script src="/js/script.js"></script>  <!--js 로 옮김-->
  <script>
    window.onload = function () {
      var output ='';
      for(let i = 0; i < 256; i++) {
        output += "<div></div>"; 
      }
      document.body.innerHTML = output; // innerHTML은 태그로 들어간다.

      const divs = document.querySelectorAll("div")
      for(let i = 0; i < divs.length; i++) {
        divs[i].style.height = "2px"
        divs[i].style.backgroundColor = `rgb(${i}, ${i}, ${i})`
      }
    }
  </script>
</head>

<body>
</body>

</html>
