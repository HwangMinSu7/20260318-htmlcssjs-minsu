<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style></style>
  <script src="/js/script.js"></script>
  <script>
    window.onload = function() {}
  </script>
</head>

<body>
  <h1>이벤트 target: delegation(위임), matches(), closest()</h1>
  <p></p>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
  <ul>
    <li>delegation 위임</li>
    <ul id="menu">
      <li>짜장</li>
      <li>짬뽕</li>
      <li>탄수육</li>
    </ul>
    <script>
      const menu = document.getElementById("menu")
      menu.addEventListener("click", (e) => {
        // li가 ul의 하위요소이기 떄문에 버블링을 역으로 이용
        alert("클릭한 항목:" + e.target.textContent);
      }) // console,log가 아니라서 , 있으면 안됌
    </script>
    
    <li>matches()</li>
    <script>
      menu.addEventListener("click", (e) => {
        if(e.target.matches("li")) {
        alert("클릭한 항목:" + e.target.textContent);
        }
      }) // console,log가 아니라서 , 있으면 안됌
    </script>

    <li>closest()</li>
    <script>
      menu.addEventListener("click", (e) => {
        const li = e.target.closest("li")
        if("li") {
        alert("클릭한 항목:" + e.target.textContent);
        }
      }) // console,log가 아니라서 , 있으면 안됌
    </script>
  </ul>



</body>

</html>
