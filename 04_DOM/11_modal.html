<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style></style>
  <script src="/js/script.js"></script>
  <script>
    window.onload = function () {

    }
  </script>
</head>

<body>
  <h1>이벤트 다루기: 행위가 일어났을 때 처리</h1>
  <p></p>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
  <button class="open-modal">모달 열기</button>

  <style>
    #modal-overlay{
      position: fixed; 
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }
    #modal {
      background: white;
      padding: 30px; 
      border-radius: 10px;
      width: 300px;
    }
  </style>
  <!-- 모달창 -->
  <div id="modal-overlay">
    <div id="modal">
      <h2>Modal Window</h2>
      <p>내용</p>
      <button id="closeBtn">닫기</button>
    </div>
  </div>
  <script>
    const modalOverlay = document.querySelector("#modal-overlay");
    const modal = document.querySelector("#modal")
    const openModal = document.querySelector(".open-modal")
    openModal.addEventListener("click", function (event) {
      modalOverlay.style.display = "flex"; // flex로 해야 가운데 정렬
    })
    document.querySelector("#closeBtn").addEventListener("click", function (e) {
      modalOverlay.style.display = 'none';
    })
  </script>




</body>

</html>
