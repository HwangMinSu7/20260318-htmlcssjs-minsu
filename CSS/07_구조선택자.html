<!DOCTYPE html>
<html lang="ko">
<!-- 상태 선택자 이거 제미나이랑 다시 공부 -->
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>

  </script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
  <style>
   ul li:nth-child(2n+1) {
    color: red; font-weight: bold;
   }
   ul span:nth-child(2n) {
    color: blue; font-weight: bold;
   }
   /* nih-child는 순서를 나타내는 것 */
   ul li:first-child {
    background-color: yellow;
   }
   ul span:last-child {
    background-color: yellow;
   }
   ol li:nth-of-type(2n) {
    color: red;
    font-weight: bold;
   }
   /* nth-of-type 리스트의 짝수 번째만 */
   ol li:nth-of-type(2n+1) {
    color: blue;
    font-weight: bold;
   }
   ol li:first-of-type {
    background-color: yellow;
   }
   ol li:last-of-type {
    background-color: yellow;
   }
  </style>
</head>

<body>
  <h1>구조 선택자</h1>
  <p></p>
  <a href="/"><span class="material-symbols-outlined">home</span>Home</a>
  <hr>
   <ul>
    <li>list 1</li>
    <span>span 1</span>
    <li>list 2</li>
    <span>span 2</span>
    <li>list 3</li>
    <span>span 3</span>
    <li>list 4</li>
    <span>span 4</span>
    <li>list 5</li>
    <span>span 5</span>
   </ul>
   <ol>
    <li>list 1</li>
    <span>span 1</span>
    <li>list 2</li>
    <span>span 2</span>
    <li>list 3</li>
    <span>span 3</span>
    <li>list 4</li>
    <span>span 4</span>
    <li>list 5</li>
    <span>span 5</span>
   </ol>

</body>

</html>
