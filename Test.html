 <hr>
  <h3>클릭, 선택창 바꾸기</h3>

<ul id="menu">
  <li>html</li>
  <li>css</li>
  <li>js</li>
</ul>
<script>
  const menu = document.querySelector("#menu");

  menu.addEventListener("click", function(e) {
    const li = e.target.closest("li");
    if(!li) return;
  }) 
  const active = menu.querySelectorAll(".active");
  if (li===active) {
    li.classList.remove("active");
    return;
  }
</script>
